<!DOCTYPE html>

<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiro de dardos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #552f70;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url("actividades fondo-36.png");
      background-size: cover;
      background-position: center;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    #scoreBox {
      position: absolute;
      top: 50%;
      left: 2vw;
      transform: translateY(-50%);
      color: #f2cf35;
      font-size: clamp(20px, 2.4vw, 38px);
      font-weight: bold;
      z-index: 5;
      text-shadow: 2px 2px 2px rgba(0,0,0,.35);
    }

    #message {
      position: absolute;
      left: 2vw;
      top: 18vh;
      width: 28vw;
      color: #f2cf35;
      font-size: clamp(16px, 1.6vw, 26px);
      line-height: 1.25;
      z-index: 5;
    }

    #timerBox {
      position: absolute;
      right: 4vw;
      top: 6vh;
      width: 18vw;
      height: 16vh;
      min-width: 160px;
      min-height: 100px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      overflow: hidden;
    }

    #timerBox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #target {
      position: absolute;
      left: 33.2vw;
      top: 5.7vh;
      width: 40.6vw;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      z-index: 2;
    }

    .dart {
      position: absolute;
      width: clamp(90px, 11vw, 170px);
      height: auto;
      cursor: grab;
      z-index: 10;
      transform-origin: 50% 50%;
      transition: filter .2s ease;
      touch-action: none;
    }

    .dart:active {
      cursor: grabbing;
      filter: brightness(1.1) drop-shadow(0 8px 10px rgba(0,0,0,.4));
    }

    .thrown {
      cursor: grab;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,.45));
    }

    #yellowDart {
      left: 7vw;
      top: 42vh;
      transform: rotate(-38deg);
    }

    #greenDart {
      left: 21vw;
      top: 39vh;
      transform: rotate(-38deg);
    }

    #purpleDart {
      left: 14vw;
      top: 64vh;
      transform: rotate(-38deg);
    }

    #nextBtn, #restartBtn {
      position: absolute;
      right: 1.5vw;
      bottom: 3.5vh;
      padding: 10px 46px;
      background: #f2cf35;
      color: #562d72;
      border: none;
      font-size: clamp(20px, 2.2vw, 38px);
      font-weight: bold;
      cursor: pointer;
      z-index: 20;
    }

    #restartBtn {
      display: none;
      right: 22vw;
    }

    #endPanel {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      z-index: 30;
      color: white;
      text-align: center;
    }

    #endPanel .box {
      background: #552f70;
      border: 4px solid #f2cf35;
      padding: 32px 42px;
      max-width: 520px;
      border-radius: 18px;
    }

    #endPanel h2 {
      color: #f2cf35;
      font-size: 42px;
      margin: 0 0 12px;
    }

    #endPanel p {
      font-size: 28px;
      margin: 10px 0 24px;
    }

    #endPanel button {
      padding: 12px 30px;
      background: #f2cf35;
      color: #552f70;
      border: 0;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main id="game">
    <div id="scoreBox">Puntaje: <span id="score">0</span></div>
    <div id="message">Arrastra cada dardo hacia el tablero. El puntaje se calcula según dónde caiga la punta.</div>
    <div id="timerBox"><img src="./Tiro de dardos_files/QTimer-60sec.webp" alt="Cronómetro de 60 segundos"></div>

    <div id="target" aria-label="Zona interactiva del tablero"></div>

    <!-- Usa la gráfica completa de fondo. Si luego tienes cada dardo en PNG separado, reemplaza estas imágenes. -->
    <img id="yellowDart" class="dart" src="./dardo-amarillo.png" alt="Dardo amarillo" draggable="false" style="left: 7vw; top: 42vh; transform: rotate(-38deg); pointer-events: auto; z-index: 10;">
          <img id="greenDart" class="dart" src="./dardo-verde.png" alt="Dardo verde" draggable="false" style="left: 21vw; top: 39vh; transform: rotate(-38deg); pointer-events: auto; z-index: 10;">
    <img id="purpleDart" class="dart" src="./dardo-morado.png" alt="Dardo morado" draggable="false" style="left: 14vw; top: 64vh; transform: rotate(-38deg); pointer-events: auto; z-index: 10;">

    <button id="restartBtn">Reiniciar</button>
    <button id="nextBtn">Siguiente</button>

    <section id="endPanel" style="display: none;">
      <div class="box">
        <h2>¡Tiempo terminado!</h2>
        <p>Puntaje final: <strong id="finalScore">142</strong></p>
        <button id="playAgainBtn">Jugar otra vez</button>
      </div>
    </section>
  </main>

  <script>
    const game = document.getElementById("game");
    const target = document.getElementById("target");
    const scoreEl = document.getElementById("score");
    const finalScoreEl = document.getElementById("finalScore");
    const timerBox = document.getElementById("timerBox");
    const endPanel = document.getElementById("endPanel");
    const restartBtn = document.getElementById("restartBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");

    let score = 0;
    let timeLeft = 60;
    let timerId = null;
    let gameEnded = false;
    let shotsThisRound = 0;

    const dartStart = {
      yellowDart: { left: "7vw", top: "42vh", rotate: -38 },
      greenDart: { left: "21vw", top: "39vh", rotate: -38 },
      purpleDart: { left: "14vw", top: "64vh", rotate: -38 }
    };

    const boardNumbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];

    function startTimer() {
      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function updateTimer() {
      // El tiempo visual lo marca el GIF de 60 segundos.
      // Esta función mantiene el conteo interno para terminar el juego.
    }

    function endGame() {
      gameEnded = true;
      clearInterval(timerId);
      finalScoreEl.textContent = score;
      endPanel.style.display = "flex";
    }

    function resetGame() {
      score = 0;
      timeLeft = 60;
      gameEnded = false;
      scoreEl.textContent = score;
      updateTimer();
      endPanel.style.display = "none";
      shotsThisRound = 0;

      timerBox.innerHTML = '<img src="QTimer-60sec.webp?restart=' + Date.now() + '" alt="Cronómetro de 60 segundos" />';

      document.querySelectorAll(".dart").forEach(dart => {
        const start = dartStart[dart.id];
        dart.classList.remove("thrown");
        dart.style.left = start.left;
        dart.style.top = start.top;
        dart.style.transform = `rotate(${start.rotate}deg)`;
        dart.style.pointerEvents = "auto";
      });

      startTimer();
    }

    function getDartTipPosition(dart) {
      const rect = dart.getBoundingClientRect();
      // Ajusta este punto si tu dardo PNG tiene la punta en otra zona.
      return {
        x: rect.left + rect.width * 0.08,
        y: rect.top + rect.height * 0.88
      };
    }

    function calculateScore(x, y) {
      const rect = target.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = x - cx;
      const dy = y - cy;
      const distance = Math.sqrt(dx * dx + dy * dy);
      const radius = rect.width / 2;

      if (distance > radius) return 0;

      // Centro del tablero.
      if (distance < radius * 0.055) return 50;
      if (distance < radius * 0.095) return 25;

      // Ángulo ajustado para que el número 20 esté arriba.
      let angle = Math.atan2(dy, dx) * 180 / Math.PI;
      angle = (angle + 450 + 9) % 360;
      const sector = Math.floor(angle / 18) % 20;
      const base = boardNumbers[sector];

      // Anillos aproximados según tablero clásico.
      if (distance > radius * 0.72 && distance < radius * 0.79) return base * 2;
      if (distance > radius * 0.43 && distance < radius * 0.50) return base * 3;

      return base;
    }

    function resetDartsOnly() {
      if (gameEnded) return;
      shotsThisRound = 0;

      document.querySelectorAll(".dart").forEach(dart => {
        const start = dartStart[dart.id];
        dart.classList.remove("thrown");
        dart.style.left = start.left;
        dart.style.top = start.top;
        dart.style.transform = `rotate(${start.rotate}deg)`;
        dart.style.zIndex = 10;
        dart.style.pointerEvents = "auto";
      });
    }

    function makeDraggable(dart) {
      let dragging = false;
      let offsetX = 0;
      let offsetY = 0;

      dart.addEventListener("pointerdown", e => {
        if (gameEnded) return;
        dragging = true;
        dart.setPointerCapture(e.pointerId);
        const rect = dart.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        dart.style.zIndex = 50;
      });

      dart.addEventListener("pointermove", e => {
        if (!dragging) return;
        dart.style.left = `${e.clientX - offsetX}px`;
        dart.style.top = `${e.clientY - offsetY}px`;
      });

      dart.addEventListener("pointerup", e => {
        if (!dragging) return;
        dragging = false;
        dart.releasePointerCapture(e.pointerId);

        const tip = getDartTipPosition(dart);
        const points = calculateScore(tip.x, tip.y);
        score += points;
        scoreEl.textContent = score;

        dart.classList.add("thrown");
        dart.style.zIndex = 12;
        shotsThisRound++;

        if (points === 0) {
          dart.style.transform = "rotate(-25deg)";
        } else {
          dart.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
        }

        // Los dardos solo regresan cuando ya se dispararon los tres.
        if (shotsThisRound >= 3) {
          setTimeout(resetDartsOnly, 650);
        }
      });
    }

    document.querySelectorAll(".dart").forEach(makeDraggable);
    restartBtn.addEventListener("click", resetGame);
    playAgainBtn.addEventListener("click", resetGame);

    document.getElementById("nextBtn").addEventListener("click", () => {
      alert(`Puntaje final: ${score}`);
    });

    resetGame();
  </script>


</body></html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tiro de Dardos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#542d70;
font-family:Arial;
}

#game{

width:100vw;
height:100vh;

background:url("actividades fondo-36.png");
background-size:cover;
background-position:center;

position:relative;

}


#timerBox{

position:absolute;

right:4vw;
top:6vh;

width:16vw;
height:16vh;

background:transparent;

z-index:20;

}

#timerBox img{

width:100%;
height:100%;
object-fit:contain;

}



#scoreBox{

position:absolute;

top:50%;
right:6vw;

transform:translateY(-50%);

color:#f2cf35;

text-align:center;

z-index:30;

}

#scoreTitle{

font-size:2vw;

}

#score{

font-size:5vw;
color:white;

}



#target{

position:absolute;

left:34vw;
top:6vh;

width:41vw;
height:41vw;

border-radius:50%;

}



.dart{

position:absolute;

width:11vw;

cursor:grab;

z-index:10;

touch-action:none;

transition:.3s;

}

.dart:active{

cursor:grabbing;

}



#yellowDart{

left:4vw;
top:43vh;

transform:rotate(-35deg);

}

#greenDart{

left:4vw;
top:56vh;

transform:rotate(-35deg);

}

#purpleDart{

left:4vw;
top:69vh;

transform:rotate(-35deg);

}


#nextBtn{

position:absolute;

right:2vw;
bottom:4vh;

padding:

12px 40px;

font-size:2vw;

background:#f2cf35;

border:none;

color:#562d72;

font-weight:bold;

cursor:pointer;

}


#end{

display:none;

position:absolute;

inset:0;

background:rgba(0,0,0,.5);

justify-content:center;
align-items:center;

z-index:100;

}


#box{

background:#552f70;

padding:30px;

border-radius:20px;

border:4px solid #f2cf35;

text-align:center;

color:white;

}

#box h1{

color:#f2cf35;

margin-bottom:15px;

}

#box button{

margin-top:20px;

padding:10px 30px;

font-size:20px;

background:#f2cf35;

border:none;

cursor:pointer;

}

</style>
</head>

<body>

<div id="game">

<div id="timerBox">

<img src="QTimer-60sec.webp">

</div>


<div id="scoreBox">

<div id="scoreTitle">
Puntaje
</div>

<div id="score">
0
</div>

</div>


<div id="target"></div>


<img src="dardo-amarillo.png"
id="yellowDart"
class="dart">

<img src="dardo-verde.png"
id="greenDart"
class="dart">

<img src="dardo-morado.png"
id="purpleDart"
class="dart">


<button id="nextBtn">
Siguiente
</button>



<div id="end">

<div id="box">

<h1>

Tiempo terminado

</h1>

Puntaje:

<h2 id="final">

0

</h2>

<button onclick="restart()">

Jugar otra vez

</button>

</div>

</div>

</div>


<script>

let puntos=0

let lanzados=0

let tiempo=60

let fin=false


const tablero=[

20,1,18,4,13,
6,10,15,2,17,
3,19,7,16,8,
11,14,9,12,5

]


const posiciones={

yellowDart:{
x:"4vw",
y:"43vh"
},

greenDart:{
x:"4vw",
y:"56vh"
},

purpleDart:{
x:"4vw",
y:"69vh"
}

}



setInterval(()=>{

tiempo--

if(tiempo<=0){

terminar()

}

},1000)



function terminar(){

fin=true

document.getElementById(
"final"
).innerHTML=puntos

document.getElementById(
"end"
).style.display="flex"

}



document
.querySelectorAll(".dart")
.forEach(dardo=>{

arrastrar(dardo)

})



function arrastrar(dardo){

let mover=false

let x=0
let y=0


dardo.addEventListener(
"pointerdown",

e=>{

if(fin)return

mover=true

let r=
dardo.getBoundingClientRect()

x=e.clientX-r.left

y=e.clientY-r.top

}

)



dardo.addEventListener(
"pointermove",

e=>{

if(!mover)return

dardo.style.left=

e.clientX-x+"px"


dardo.style.top=

e.clientY-y+"px"

})



dardo.addEventListener(
"pointerup",

()=>{

if(!mover)return

mover=false


let p=
punta(dardo)


let s=
puntaje(
p.x,
p.y
)

puntos+=s

document
.getElementById(
"score"
)
.innerHTML=puntos


lanzados++


if(lanzados>=3){

setTimeout(()=>{

reiniciarDardos()

},800)

}

})

}



function punta(d){

let r=
d.getBoundingClientRect()

return{

x:r.left+
r.width*.1,

y:r.top+
r.height*.8

}

}



function puntaje(x,y){

let r=
target.getBoundingClientRect()

let cx=
r.left+r.width/2

let cy=
r.top+r.height/2

let dx=x-cx

let dy=y-cy

let dist=
Math.sqrt(
dx*dx+
dy*dy
)

let radio=
r.width/2


if(
dist>radio
)return 0


if(
dist<radio*.05
)return 50


if(
dist<radio*.10
)return 25


let ang=
Math.atan2(
dy,
dx
)

*180/Math.PI


ang=
(ang+450+9)%360


let sec=
Math.floor(
ang/18
)


let base=
tablero[sec]


if(
dist>radio*.72
&&
dist<radio*.79
)

return base*2


if(
dist>radio*.44
&&
dist<radio*.5
)

return base*3


return base

}



function reiniciarDardos(){

lanzados=0


document
.querySelectorAll(
".dart"
)

.forEach(d=>{


d.style.left=
posiciones[d.id].x


d.style.top=
posiciones[d.id].y


d.style.transform=
"rotate(-35deg)"


})

}



function restart(){

location.reload()

}

</script>

</body>
</html>
